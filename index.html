<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clube do Achado — Achadinhos e Ofertas do Dia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .logo { font-size: 4rem; margin-bottom: 16px; }
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    h1 span { color: #FE2C55; }
    .tagline {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 40px;
      max-width: 480px;
    }
    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 60px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .btn-tiktok  { background: #FE2C55; color: #fff; }
    .btn-insta   { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); color: #fff; }
    .btn-linktree { background: #1da462; color: #fff; }
    .legal {
      margin-top: 40px;
      font-size: 0.82rem;
      color: #555;
    }
    .legal a { color: #888; text-decoration: none; margin: 0 8px; }
    .legal a:hover { color: #ccc; }
  </style>
</head>
<body>

  <div class="logo">🛍️</div>
  <h1>Clube do <span>Achado</span></h1>
  <p class="tagline">
    Os melhores achadinhos do Brasil — produtos incríveis com preços que você não acredita.
  </p>

  <div class="links">
    <a class="btn btn-tiktok" href="https://www.tiktok.com/@clubedoachadoia" target="_blank">
      🎵 TikTok
    </a>
    <a class="btn btn-insta" href="https://www.instagram.com/achadinhosia82" target="_blank">
      📸 Instagram
    </a>
    <a class="btn btn-linktree" href="https://linktr.ee/clubedoachado" target="_blank">
      🔗 Todos os Links
    </a>
  </div>

  <div class="legal">
    <a href="legal/privacy-policy.html">Política de Privacidade</a>
    <a href="legal/terms-of-service.html">Termos de Uso</a>
    <a href="mailto:mathyass1982@gmail.com">Contato</a>
  </div>

</body>
</html>
