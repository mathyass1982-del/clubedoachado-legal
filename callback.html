<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok OAuth — Callback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    h1 { font-size: 1.6rem; margin-bottom: 12px; }
    .status-ok  { color: #4ade80; }
    .status-err { color: #f87171; }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 32px;
      margin-top: 24px;
      max-width: 640px;
      width: 100%;
      text-align: left;
    }
    label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .code-box {
      background: #111;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 16px;
      margin-top: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
      color: #FE2C55;
      cursor: pointer;
      user-select: all;
    }
    .copy-btn {
      margin-top: 16px;
      background: #FE2C55;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .copy-btn:hover { background: #e0253f; }
    .hint { margin-top: 20px; font-size: 0.82rem; color: #666; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const root  = document.getElementById('root');

    if (error) {
      root.innerHTML = `
        <h1 class="status-err">❌ Autorização negada</h1>
        <p style="color:#888;margin-top:8px;">Erro: ${error}</p>
      `;
    } else if (code) {
      root.innerHTML = `
        <h1 class="status-ok">✅ Autorização concluída!</h1>
        <div class="card">
          <label>Authorization Code</label>
          <div class="code-box" id="code-val">${code}</div>
          <button class="copy-btn" onclick="copyCode()">📋 Copiar código</button>
          ${state ? `<div style="margin-top:20px"><label>State</label><div class="code-box">${state}</div></div>` : ''}
          <p class="hint">Cole esse código no terminal quando solicitado pelo script de OAuth.</p>
        </div>
      `;
    } else {
      root.innerHTML = `
        <h1 class="status-err">⚠️ Nenhum código recebido</h1>
        <p style="color:#888;margin-top:8px;">Acesse esta página após completar o fluxo OAuth do TikTok.</p>
      `;
    }

    function copyCode() {
      const code = document.getElementById('code-val').innerText;
      navigator.clipboard.writeText(code).then(() => {
        document.querySelector('.copy-btn').textContent = '✅ Copiado!';
        setTimeout(() => document.querySelector('.copy-btn').textContent = '📋 Copiar código', 2000);
      });
    }
  </script>
</body>
</html>
